# One-command local/cloud stack: Postgres + the API.
# Local:   docker compose up --build         → API on http://localhost:8787
# The game frontend keeps running from `node tools/serve.mjs` (port 5173).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: soulshard
      # 本地 demo 預設為 soulshard;正式部署請在 .env 設定強密碼(POSTGRES_PASSWORD=…)覆寫。
      # 註:db 服務未對外開 port,只在 compose 內網可達,故 demo 預設值風險受限。
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soulshard}
      POSTGRES_DB: soulshard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soulshard"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://soulshard:${POSTGRES_PASSWORD:-soulshard}@db:5432/soulshard
      JWT_SECRET: ${JWT_SECRET:?set a strong JWT_SECRET first, e.g. export JWT_SECRET=$(openssl rand -hex 48)}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173}
      ADMIN_USERS: ${ADMIN_USERS:-}   # comma-separated usernames granted the 🛠 admin console (read from .env)
      NODE_ENV: production
      PORT: "8787"
    ports:
      - "8787:8787"

volumes:
  pgdata:
